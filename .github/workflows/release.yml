name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: x402-cashu/package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: x402-cashu
        run: npm ci

      - name: Build
        working-directory: x402-cashu
        run: npm run build

      - name: Release
        working-directory: x402-cashu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
