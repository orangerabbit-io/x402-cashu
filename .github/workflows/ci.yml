name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: x402-cashu/package-lock.json

      - name: Install dependencies
        working-directory: x402-cashu
        run: npm ci

      - name: Type check
        working-directory: x402-cashu
        run: npx tsc --noEmit

      - name: Build
        working-directory: x402-cashu
        run: npm run build

      - name: Unit tests
        working-directory: x402-cashu
        run: npx vitest run

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Cashu mint
        run: |
          docker run -d --name mint \
            -p 3338:3338 \
            -e MINT_LISTEN_HOST=0.0.0.0 \
            -e MINT_LISTEN_PORT=3338 \
            -e MINT_BACKEND_BOLT11_SAT=FakeWallet \
            -e MINT_PRIVATE_KEY=TEST_PRIVATE_KEY_DO_NOT_USE_IN_PRODUCTION \
            cashubtc/nutshell:0.19.2 \
            poetry run mint

      - name: Wait for mint to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3338/v1/info > /dev/null 2>&1; then
              echo "Mint is ready"
              exit 0
            fi
            echo "Waiting for mint... ($i/30)"
            sleep 2
          done
          echo "Mint failed to start"
          docker logs mint
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: x402-cashu/package-lock.json

      - name: Install dependencies
        working-directory: x402-cashu
        run: npm ci

      - name: Integration tests
        working-directory: x402-cashu
        env:
          TEST_MINT_URL: "http://localhost:3338"
        run: npx vitest run --config vitest.integration.config.ts
